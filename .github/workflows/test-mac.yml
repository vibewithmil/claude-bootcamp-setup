name: Test Mac installer

on:
  push:
    paths:
      - mac.sh
      - .github/workflows/test-mac.yml
  workflow_dispatch:

jobs:
  run-installer:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run mac.sh end-to-end
        run: bash mac.sh
      - name: Verify results
        run: |
          set -e
          command -v node >/dev/null && echo "node: $(node --version)"
          command -v npm  >/dev/null && echo "npm:  $(npm --version)"
          command -v claude >/dev/null && echo "claude: $(claude --version)" || echo "claude on PATH check (may need shell reload)"
          test -d "/Applications/Visual Studio Code.app" && echo "VS Code: installed" || echo "VS Code: app not found"
          test -d "$HOME/Desktop/claude-bootcamp" && echo "folder: created" || (echo "folder missing" && exit 1)
